openapi: 3.1.0
info:
  title: Finanzas Personales Local API
  version: 0.1.0
  description: Internal local API Routes for the single-user personal finance app. These routes are not external services.
servers:
  - url: http://localhost:3000
paths:
  /api/transactions:
    get:
      summary: List transactions
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: type
          in: query
          schema: { type: string, enum: [income, expense] }
        - name: categoryId
          in: query
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Paginated transactions ordered by date descending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionPage"
    post:
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/transactions/{id}:
    patch:
      summary: Update transaction
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete transaction
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/categories:
    get:
      summary: List active categories
      responses:
        "200":
          description: Active categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      summary: Create custom category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
  /api/categories/{id}:
    patch:
      summary: Update custom category
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      summary: Delete or archive custom category
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: transactionAction
          in: query
          required: true
          schema:
            type: string
            enum: [reassign, keepHistorical]
        - name: reassignToCategoryId
          in: query
          schema: { type: integer }
      responses:
        "204":
          description: Category removed from active use
        "409":
          description: Category has transactions and requires a valid transaction action
  /api/budgets:
    get:
      summary: List budgets for a month
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      responses:
        "200":
          description: Budgets with derived progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetProgress"
    post:
      summary: Create or update category budget for a month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetInput"
      responses:
        "200":
          description: Saved budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
  /api/reports/monthly:
    get:
      summary: Get monthly report and 12-month trend data
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"
  /api/export/transactions:
    get:
      summary: Export all transactions as CSV
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema: { type: string }
  /api/export/monthly-report:
    get:
      summary: Export selected monthly report as CSV
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema: { type: string }
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
  responses:
    ValidationError:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
        issues:
          type: array
          items: { type: string }
    TransactionInput:
      type: object
      required: [type, amount, description, categoryId, date]
      properties:
        type: { type: string, enum: [income, expense] }
        amount: { type: number, exclusiveMinimum: 0 }
        description: { type: string, minLength: 1 }
        categoryId: { type: integer, minimum: 1 }
        date: { type: string, format: date }
    Transaction:
      allOf:
        - $ref: "#/components/schemas/TransactionInput"
        - type: object
          required: [id, createdAt]
          properties:
            id: { type: integer }
            categoryName: { type: string }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    TransactionPage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
    CategoryInput:
      type: object
      required: [name, icon, color]
      properties:
        name: { type: string, minLength: 1 }
        icon: { type: string, minLength: 1 }
        color: { type: string, minLength: 1 }
    Category:
      allOf:
        - $ref: "#/components/schemas/CategoryInput"
        - type: object
          required: [id, isDefault, createdAt]
          properties:
            id: { type: integer }
            isDefault: { type: boolean }
            createdAt: { type: string, format: date-time }
    BudgetInput:
      type: object
      required: [categoryId, month, limitAmount]
      properties:
        categoryId: { type: integer, minimum: 1 }
        month: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
        limitAmount: { type: number, exclusiveMinimum: 0 }
    Budget:
      allOf:
        - $ref: "#/components/schemas/BudgetInput"
        - type: object
          required: [id, createdAt]
          properties:
            id: { type: integer }
            createdAt: { type: string, format: date-time }
    BudgetProgress:
      allOf:
        - $ref: "#/components/schemas/Budget"
        - type: object
          required: [spentAmount, percentage, status]
          properties:
            spentAmount: { type: number }
            percentage: { type: number }
            status: { type: string, enum: [safe, warning, overLimit] }
    MonthlyReport:
      type: object
      required: [month, totalIncome, totalExpenses, balance, categoryBreakdown, topCategories, trend]
      properties:
        month: { type: string }
        totalIncome: { type: number }
        totalExpenses: { type: number }
        balance: { type: number }
        categoryBreakdown:
          type: array
          items:
            type: object
            required: [categoryId, categoryName, total, percentage]
            properties:
              categoryId: { type: integer }
              categoryName: { type: string }
              total: { type: number }
              percentage: { type: number }
        topCategories:
          type: array
          maxItems: 5
          items:
            type: object
            required: [categoryId, categoryName, total]
            properties:
              categoryId: { type: integer }
              categoryName: { type: string }
              total: { type: number }
        trend:
          type: array
          items:
            type: object
            required: [month, income, expenses, balance]
            properties:
              month: { type: string }
              income: { type: number }
              expenses: { type: number }
              balance: { type: number }
